version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: policy-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
    command: serve
    restart: unless-stopped

volumes:
  ollama-data:
    driver: local
